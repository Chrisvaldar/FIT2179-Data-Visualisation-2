# GitHub Pages — optional Jekyll config (overridden by .nojekyll at repo root).
# .nojekyll disables Jekyll so data/, charts/, and assets/ are published as static files.
# The references/ folder is a local Vega-Lite doc mirror with {% include %} tags
# that only exist on vega.github.io; building them breaks Pages.

title: Sharks in Australian Waters
description: FIT2179 Data Visualisation 2

# Ensure chart data and topojson are copied to _site (not only parsed as Jekyll data).
include:
  - data

exclude:
  - references
  - scripts
  - data/base_data
  - shark_attack_plan.md
  - PROJECT_STATE.md
  - CHART_LAYOUT.md
